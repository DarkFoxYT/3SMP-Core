settings:
  default-crate: prophecy
  broadcast-tiers:
    - legendary
    - epic
  broadcast-message: "<dark_gray>[</dark_gray>{crate}<dark_gray>]</dark_gray> <gradient:#f4cd2a:#ffffff>{player}</gradient> <gray>opened destiny and found</gray> {reward} <dark_gray>(</dark_gray>{tier}<dark_gray>)</dark_gray>"
  opening:
    ticks: 45
    interval-ticks: 2
  gui:
    selection-title: ':offset_-15:&f:crate_gui:'
    preview-title: ':offset_-15:&f:crate_preview:'
    opening-title: ':offset_-15:&f:crate_gui:'
    itemsadder-font-symbols:
      crate_gui: "\\uA427"
      crate_selection: "\\uA429"
      crate_preview: "\\uA42A"

crates:
  prophecy:
    display-name: "<gradient:#f4cd2a:#7c3aed><bold>Prophecy Crate</bold></gradient>"
    key-item: "threesmp:prophecy_key"
    block-item: "threesmp:prophecy_crate"
    model-engine-model: "prophecy_crate"
    fallback-block: "ENDER_CHEST"
    hologram-y-offset: 2.35
    protect-block: true
    description:
      - "<gray>Contains exclusive gear, ranks, cosmetics,</gray>"
      - "<gray>boosters, and sapphire-themed rewards.</gray>"
    hologram:
      - "<gradient:#f4cd2a:#7c3aed><bold>Prophecy Crate</bold></gradient>"
      - "<gray>Exclusive gear, ranks, cosmetics, and boosters</gray>"
      - "<#f4cd2a>Right-click</#f4cd2a> <gray>with a Prophecy Key</gray>"
      - "<#c084fc>Shift Right-click</#c084fc> <gray>to preview rewards</gray>"
    rewards:
      prophecy_key:
        tier: legendary
        chance: 0.5
        display: "<gradient:#f4cd2a:#7c3aed>Prophecy Key</gradient>"
        material: TRIPWIRE_HOOK
        amount: 2
        itemsadder: "threesmp:prophecy_key"
        lore:
          - "<gray>Gives two more rolls."
      forsaken_elytra:
        tier: legendary
        chance: 0.5
        display: "<gradient:#4169e1:#f4cd2a>Forsaken Elytra</gradient>"
        material: ELYTRA
        itemsadder: "threesmp:forsaken_elytra"
        lore:
          - "<gray>Custom elytra with launch and trail power.</gray>"
      eschaton:
        tier: legendary
        chance: 1
        display: "<gradient:#f4cd2a:#ffffff>Eschaton</gradient>"
        material: TRIDENT
        itemsadder: "threesmp:eschaton"
        lore:
          - "<gray>Golden rapier with impaling lunge and backstep.</gray>"
      veilcutter:
        tier: legendary
        chance: 1
        display: "<gradient:#38bdf8:#2563eb>Veilcutter</gradient>"
        material: NETHERITE_SWORD
        itemsadder: "threesmp:veilcutter"
        lore:
          - "<gray>Custom sword reward."
      pandoras_pick:
        tier: legendary
        chance: 1
        display: "<gradient:#f4cd2a:#38bdf8>Pandora's Pick</gradient>"
        material: NETHERITE_PICKAXE
        itemsadder: "threesmp:pandoras_pick"
        lore:
