        chance: 1
        display: "<gradient:#38bdf8:#4169e1>Lazurite</gradient>"
        material: BLAZE_ROD
        itemsadder: "threesmp:lazurite"
        lore:
          - "<gray>Custom projectile item."
      founding_gem_blade:
        tier: legendary
        chance: 1
        display: "<gradient:#f4cd2a:#38bdf8>Founding Gem Blade</gradient>"
        material: NETHERITE_SWORD
        itemsadder: "threesmp:sapphire_edge"
        lore:
