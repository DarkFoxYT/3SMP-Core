menus:
  deluxemenus:
    enabled: true
    main-menu: "duels_menu"
    kits-menu: "duels_kits"
    # Creates starter files in plugins/DeluxeMenus/gui_menus if missing.
    # Use DeluxeMenus for the real custom UI, and keep this plugin's Bukkit GUI as fallback.
    install-examples: true
  # These must match the single-character ItemsAdder font_image symbols.
  # You can keep using :duels_menu: below; 3SMPCore replaces it with these values.
  itemsadder-font-symbols:
    duels_menu: "\\uE001"
    duels_solo: "\\uE002"
    duels_duo: "\\uE003"
    duels_solo_hover: "\\uE004"
    duels_duo_hover: "\\uE005"
  duel:
    title: ""
    # Put ItemsAdder GUI/font-image glyphs here, e.g. ":duels_menu:"
    # This is prepended to the inventory title so custom GUI backgrounds can render.
    background: ":duels_menu:"
    # Extra font-image layers. Use these for button art baked as GUI title glyphs.
    # True hover swapping is not possible server-side because inventory hover is client-only.
    layers:
      - ":duels_solo:"
      - ":duels_duo:"
    size: 54
    frame: "AIR"
    # Every button supports:
    # material: VANILLA_MATERIAL
    # itemsadder: "namespace:id"
    # If ItemsAdder is missing or the id is invalid, material is used.
    items:
      solo:
        material: AIR
        itemsadder: ""
        font-image: ":duels_solo:"
        hover-font-image: ":duels_solo_hover:"
      party:
        material: AIR
        itemsadder: ""
        font-image: ":duels_duo:"
        hover-font-image: ":duels_duo_hover:"
      kit:
        itemsadder: ""
      queued-kit:
        material: LIME_DYE
        itemsadder: ""
      back:
        material: ARROW
        itemsadder: ""
      summary-solo:
        material: DIAMOND_SWORD
        itemsadder: ""
      summary-party:
        material: PLAYER_HEAD
        itemsadder: ""
      summary-maps:
        material: MAP
        itemsadder: ""
      summary-winner:
        material: GOLD_BLOCK
        itemsadder: ""
      summary-stats:
        material: PAPER
        itemsadder: ""
  party:
    title: "<gradient:#1A2A4A:#D6E8F7>3SMP Party</gradient>"
    background: ""
    size: 27
    frame: "LIGHT_BLUE_STAINED_GLASS_PANE"
  dev:
    title: "<gradient:#1A2A4A:#D6E8F7>3SMP Dev</gradient>"
    background: ""
    size: 54
    frame: "GRAY_STAINED_GLASS_PANE"
    items:
      header: { material: NETHER_STAR, itemsadder: "" }
      arena-select: { material: MAP, itemsadder: "" }
      arena-tools: { material: ARMOR_STAND, itemsadder: "" }
      leaderboards: { material: OAK_SIGN, itemsadder: "" }
      kit-editor: { material: SMITHING_TABLE, itemsadder: "" }
      dungeon-editor: { material: STRUCTURE_VOID, itemsadder: "" }
      disable-duels: { material: REDSTONE_BLOCK, itemsadder: "" }
      enable-duels: { material: EMERALD_BLOCK, itemsadder: "" }
      launchpads: { material: SLIME_BLOCK, itemsadder: "" }
      save-arena: { material: STRUCTURE_BLOCK, itemsadder: "" }
  kits:
    title: "<gradient:#1A2A4A:#D6E8F7>3SMP Duel Kits</gradient>"
    background: ""
  summary:
    title: "<gradient:#1A2A4A:#D6E8F7>3SMP Duel Summary</gradient>"
    background: ""
