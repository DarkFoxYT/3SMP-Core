menus:
  deluxemenus:
    enabled: true
    main-menu: "duels_menu"
    kits-menu: "duels_kits"
    install-examples: true

  itemsadder-font-symbols:
    duels_menu: "\\uA420"
    duels_kits: "\\uA426"
  duel:
    title: ""
    # Put ItemsAdder GUI/font-image glyphs here, e.g. ":duels_menu:"
    # This is prepended to the inventory title so custom GUI backgrounds can render.
    background: ":duels_menu:"
    layers: []
    size: 54
    frame: "AIR"
    # Every button supports:
    # material: VANILLA_MATERIAL
    # itemsadder: "namespace:id"
    # If ItemsAdder is missing or the id is invalid, material is used.
    items:
      solo:
        material: AIR
        itemsadder: ""
      party:
        material: AIR
        itemsadder: ""
      kit:
        itemsadder: ""
      queued-kit:
        material: LIME_DYE
        itemsadder: ""
      summary-solo:
        material: DIAMOND_SWORD
        itemsadder: ""
      summary-party:
        material: PLAYER_HEAD
        itemsadder: ""
      summary-maps:
        material: MAP
        itemsadder: ""
      summary-winner:
        material: GOLD_BLOCK
        itemsadder: ""
      summary-stats:
        material: PAPER
        itemsadder: ""
  party:
    title: "<gradient:#f4cd2a:#eda323:#d28d0d>3SMP Party</gradient>"
    background: ""
    size: 27
    frame: "LIGHT_BLUE_STAINED_GLASS_PANE"
  dev:
    title: "<gradient:#f4cd2a:#eda323:#d28d0d>3SMP Dev</gradient>"
    background: ""
    size: 54
    frame: "GRAY_STAINED_GLASS_PANE"
    items:
      header: { material: NETHER_STAR, itemsadder: "" }
      arena-select: { material: MAP, itemsadder: "" }
      arena-tools: { material: ARMOR_STAND, itemsadder: "" }
      leaderboards: { material: OAK_SIGN, itemsadder: "" }
      kit-editor: { material: SMITHING_TABLE, itemsadder: "" }
      dungeon-editor: { material: STRUCTURE_VOID, itemsadder: "" }
      disable-duels: { material: REDSTONE_BLOCK, itemsadder: "" }
      enable-duels: { material: EMERALD_BLOCK, itemsadder: "" }
      launchpads: { material: SLIME_BLOCK, itemsadder: "" }
      save-arena: { material: STRUCTURE_BLOCK, itemsadder: "" }
  kits:
    title: "<gradient:#f4cd2a:#eda323:#d28d0d>3SMP Duel Kits</gradient>"
    background: ""
  summary:
    title: "<gradient:#f4cd2a:#eda323:#d28d0d>3SMP Duel Summary</gradient>"
    background: ""
