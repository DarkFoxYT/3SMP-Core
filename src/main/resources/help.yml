# 3SMPCore Help Configuration
#
# This file controls the custom /help command.
# It overrides Minecraft/Paper's normal /help through plugin.yml.
#
# Text formatting uses MiniMessage:
# - Hex color: <#D6E8F7>Hello</#D6E8F7>
# - Named color: <red>Error</red>, <white>Text</white>, <gray>Muted</gray>
# - Gradient: <gradient:#1A2A4A:#f59e0b>3SMP</gradient>
# - Style: <bold>Bold</bold>, <italic>Italic</italic>, <underlined>Underlined</underlined>
#
# Placeholders available here:
# - {player}  Player or sender name
# - {server}  Server name below
# - {version} Plugin version

settings:
  server-name: "3SMP"
  default-page: "main"

messages:
  unknown-page: "<red>That help page does not exist.</red>"
  no-permission: "<red>You cannot view that help page.</red>"

pages:
  main:
    permission: ""
    lines:
      - ""
      - "<gradient:#1A2A4A:#f59e0b><bold>{server} Help</bold></gradient> <dark_gray>|</dark_gray> <#D6E8F7>Use <white>/help commands</white> for commands.</#D6E8F7>"
      - "<#D6E8F7>/spawn</#D6E8F7> <gray>Go back to spawn.</gray>"
      - "<#D6E8F7>/rtp</#D6E8F7> <gray>Random teleport in supported worlds.</gray>"
      - "<#D6E8F7>/warp</#D6E8F7> <gray>Open the warp menu.</gray>"
      - "<#D6E8F7>/perks</#D6E8F7> <gray>Open cosmetics, chat colors, particles, and trims.</gray>"
      - "<#D6E8F7>/sapphire bal</#D6E8F7> <gray>Check your Sapphire balance.</gray>"
      - "<#D6E8F7>/party</#D6E8F7> <gray>Open your party menu.</gray>"
      - "<dark_gray>Pages:</dark_gray> <white>/help commands</white> <gray>|</gray> <white>/help perks</white> <gray>|</gray> <white>/help admin</white>"
      - ""
  commands:
    permission: ""
    lines:
      - ""
      - "<gradient:#1A2A4A:#f59e0b><bold>Useful Commands</bold></gradient>"
      - "<#D6E8F7>/sapphire shop</#D6E8F7> <gray>Open the Sapphire shop link.</gray>"
      - "<#D6E8F7>/gems</#D6E8F7> <gray>Open the gem menu.</gray>"
      - "<#D6E8F7>/duel</#D6E8F7> <gray>Open duel queues and kits.</gray>"
      - "<#D6E8F7>/p</#D6E8F7> <gray>Shortcut for party tools.</gray>"
      - "<#D6E8F7>/launchpad menu</#D6E8F7> <gray>Admin launchpad editor.</gray>"
      - ""
  perks:
    permission: ""
    lines:
      - ""
      - "<gradient:#1A2A4A:#f59e0b><bold>Perks</bold></gradient>"
      - "<#D6E8F7>/perks</#D6E8F7> <gray>Choose prefixes, tags, trims, message colors, and cosmetics.</gray>"
      - "<gray>Message colors support gradients, hex colors, and styled previews.</gray>"
      - "<gray>Particle cosmetics are opt-in and only activate when selected.</gray>"
      - ""
  admin:
    permission: "3smpcore.admin"
    lines:
      - ""
      - "<gradient:#1A2A4A:#f59e0b><bold>Admin Help</bold></gradient> <dark_gray>v{version}</dark_gray>"
      - "<#D6E8F7>/3smpcore reload</#D6E8F7> <gray>Reload configs and managers.</gray>"
      - "<#D6E8F7>/3smpcore devpanel</#D6E8F7> <gray>Open developer tools.</gray>"
      - "<#D6E8F7>/launchpad menu</#D6E8F7> <gray>Edit placed launchpads.</gray>"
      - "<#D6E8F7>/sapphire give <player> <amount></#D6E8F7> <gray>Give Sapphires.</gray>"
      - "<#FF5555>Keep admin pages permission-gated in this file.</#FF5555>"
      - ""
