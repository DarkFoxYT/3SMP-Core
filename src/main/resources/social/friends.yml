friends:
  enabled: true
  max-friends: 50
  requests:
    clickable-chat: true
    timeout-seconds: 120
  tab:
    sneak-cycle-enabled: false
    force-global-list: true
    separate-duel-worlds: true
    tab-plugin-compatible: true
    duels:
      same-world-only: true
      worlds:
        - "duels"
    legacy-visuals-enabled: false
    visuals:
      enabled: true
      override-tab-plugin: true
      force-over-tab-plugin: true
      refresh-ticks: 20
      shadows:
        enabled: true
        default: "#020617:0.70"
        scoreboard: "#020617:0.80"
        tab: "#020617:0.70"
        nametag: "#020617:0.75"
        ranks:
          owner: "#332000:0.95"
          dev: "#001a33:0.90"
          admin: "#280000:0.90"
          ultra: "#2a1600:0.90"
          mvp: "#001a33:0.85"
          default: "#020617:0.70"
      images:
        enabled: true
        strip-missing: false
        placeholders:
          server_logo: "%img_server_logo%"
          owner: "%img_owner%"
          dev: "%img_dev%"
          admin: "%img_admin%"
          sr_admin: "%img_sr_admin%"
          mod: "%img_mod%"
          builder: "%img_builder%"
          sr_mod: "%img_sr_mod%"
          jr_mod: "%img_jr_mod%"
          pro: "%img_pro%"
          mvp: "%img_mvp%"
          ultra: "%img_ultra%"
          patron: "%img_patron%"
          3smp: "%img_3smp%"
          solo_text: "%img_solo_text%"
          solo_icon: "%img_solo_icon%"
    world-display-names:
      world: "Survival"
      world_nether: "Nether"
      world_the_end: "The End"
      duels: "Duels"
      dungeons: "Dungeons"
    header:
      - ""
      - "%img_server_logo%"
      - ""
      - "{grad:royal_gold}&lPLAY.3SMP.NET{/grad}"
      - "{grad:soft}Survival • Duels • Dungeons{/grad}"
      - "{grad:soft_gold}Crates - Sapphires - Parties{/grad}"
      - ""
    footer:
      - ""
      - "{grad:soft}Online {/grad}{grad:gold}%online%{/grad}{grad:soft} players{/grad}"
      - "{grad:soft}Friends {/grad}{grad:royal}%3smpcore_friends_list%{/grad}"
      - ""
      - "{grad:gold}/vote{/grad} {grad:soft}to support us{/grad}   {grad:royal}/store{/grad}"
      - ""
      - "{grad:royal_gold}&lThanks for playing 3SMP{/grad}"
      - ""
    player-format: "<rank_image> {grad:rank}<player>{/grad} <tab_tag>"
    afk:
      enabled: true
      keep-visible: true
      worlds:
        - "afk_void"
      suffix: " <dark_gray>[AFK]</dark_gray>"
    nametag-prefix: "<rank_image> "
    nametag-suffix: " <tab_tag>"
    nametag-display: "<rank_image> {grad:rank}<player>{/grad}"
    gradients:
      default: "#ffffff:#ffffff"
      soft: "#ffffff:#fff7ad"
      blue_soft: "#f4cd2a:#eda323:#d28d0d"
      royal: "#f4cd2a:#eda323:#d28d0d"
      gold: "#f4cd2a:#eda323:#d28d0d"
      royal_gold: "#f4cd2a:#eda323:#d28d0d"
      owner: "#f4cd2a:#eda323:#d28d0d"
      admin: "#ff4d4d:#fb923c"
      dev: "#38bdf8:#a78bfa"
      ultra: "#ef4444:#f97316:#f4cd2a"
      mvp: "#60a5fa:#c084fc"
      pro: "#22d3ee:#38bdf8"
      member: "#ffffff:#ffffff"
      3smp: "#f4cd2a:#eda323:#d28d0d"
      "3": "#f4cd2a:#eda323:#d28d0d"
    duels:
      name-colors-enabled: false
      team-one-gradient: "#ef4444:#fca5a5"
      team-two-gradient: "#2563eb:#93c5fd"
    chat:
      message-color: "#fff7ad"
    ranks:
      default:
        image: ""
        prefix: ""
        tab-prefix: ""
        gradient: "default"
        sort-weight: 999
      owner:
        image: "<img:owner>"
        prefix: ""
        tab-prefix: ""
        gradient: "owner"
        sort-weight: 1
      dev:
        image: "<img:dev>"
        prefix: ""
        tab-prefix: ""
        gradient: "dev"
        sort-weight: 2
      admin:
        image: "<img:admin>"
        prefix: ""
        tab-prefix: ""
        gradient: "admin"
        sort-weight: 3
      ultra:
        image: "<img:ultra>"
        prefix: ""
        tab-prefix: ""
        gradient: "ultra"
        sort-weight: 10
      mvp:
        image: "<img:mvp>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 20
      member:
        image: ""
        prefix: ""
        tab-prefix: ""
        gradient: "member"
        sort-weight: 100
      sr-admin:
        image: "<img:sr_admin>"
        prefix: ""
        tab-prefix: ""
        gradient: "admin"
        sort-weight: 4
      mod:
        image: "<img:mod>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 5
      sr-mod:
        image: "<img:sr_mod>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 6
      jr-mod:
        image: "<img:jr_mod>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 7
      builder:
        image: "<img:builder>"
        prefix: ""
        tab-prefix: ""
        gradient: "gold"
        sort-weight: 8
      patron:
        image: "<img:patron>"
        prefix: ""
        tab-prefix: ""
        gradient: "ultra"
        sort-weight: 15
      pro:
        image: "<img:pro>"
        prefix: ""
        tab-prefix: ""
        gradient: "pro"
        sort-weight: 35
      "3":
        image: "<img:3smp>"
        prefix: ""
        tab-prefix: ""
        gradient: "3"
        sort-weight: 40
    sorting:
      enabled: true
      order:
        - owner
        - dev
        - admin
        - sr-mod
        - mod
        - ultra
        - mvp
        - pro
        - "3"
        - member
        - default
  scoreboards:
    enabled: true
    refresh-ticks: 20
    hide-line-numbers: true
    center:
      enabled: true
      title: true
      width: 28
      image-widths:
        server_logo: 10
        owner: 4
        dev: 4
        admin: 4
        sr_admin: 4
        mod: 4
        builder: 4
        sr_mod: 4
        jr_mod: 4
        pro: 4
        mvp: 4
        ultra: 4
        patron: 4
        3smp: 4
        solo_text: 28
    active: default
    boards:
      default:
        title: "<img:solo_text>"
        lines:
          - "{grad:gold}&m--------------{/grad}"
          - "{grad:gold}&lPLAYER{/grad}"
          - "&#dbeafe%player_name%"
          - ""
          - "{grad:gold}&lRANK{/grad}"
          - "{grad:gold}%3smpcore_scoreboard_rank%{/grad}"
          - ""
          - "{grad:gold}&lLOCATION{/grad}"
          - "{grad:gold}%world%{/grad}"
          - ""
          - "{grad:gold}&lECONOMY{/grad}"
          - "{grad:gold}$ %smpcore_money_formatted%{/grad}"
          - "{grad:gold}* %smpcore_sapphires% Sapphires{/grad}"
          - ""
          - "{grad:gold}&lSERVER{/grad}"
          - "{grad:gold}%online% online{/grad} &#64748b| {grad:gold}%ping%{/grad}"
          - "{grad:gold}&m--------------{/grad}"
          - "{grad:gold}PLAY.3SMP.NET{/grad}"
