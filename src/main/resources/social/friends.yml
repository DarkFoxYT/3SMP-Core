friends:
  enabled: true
  max-friends: 50
  requests:
    clickable-chat: true
    timeout-seconds: 120
  tab:
    sneak-cycle-enabled: true
    tab-plugin-compatible: true
    legacy-visuals-enabled: false
    visuals:
      enabled: true
      override-tab-plugin: true
      force-over-tab-plugin: true
      refresh-ticks: 20
      shadows:
        enabled: true
        default: "#020617:0.70"
        scoreboard: "#020617:0.80"
        tab: "#020617:0.70"
        nametag: "#020617:0.75"
        ranks:
          owner: "#332000:0.95"
          dev: "#001a33:0.90"
          admin: "#280000:0.90"
          ultra: "#2a1600:0.90"
          mvp: "#001a33:0.85"
          vip: "#001525:0.80"
          default: "#020617:0.70"
      images:
        enabled: true
        strip-missing: false
        placeholders:
          server_logo: "%img_server_logo%"
          owner: "%img_owner%"
          dev: "%img_dev%"
          admin: "%img_admin%"
          sr_admin: "%img_sr_admin%"
          mod: "%img_mod%"
          builder: "%img_builder%"
          sr_mod: "%img_sr_mod%"
          jr_mod: "%img_jr_mod%"
          pro: "%img_pro%"
          mvp: "%img_mvp%"
          elite: "%img_elite%"
          ultra: "%img_ultra%"
          vip: "%img_vip%"
          patron: "%img_patron%"
          3smp: "%img_3smp%"
          solo_text: "%img_solo_text%"
    world-display-names:
      world: "Survival"
      world_nether: "Nether"
      world_the_end: "The End"
      duels: "Duels"
      dungeons: "Dungeons"
    header:
      - ""
      - "%img_server_logo%"
      - ""
      - "{grad:royal_gold}&lPLAY.3SMP.NET{/grad}"
      - "{grad:soft}Survival • Duels • Dungeons{/grad}"
      - "{grad:soft_gold}Crates - Sapphires - Parties{/grad}"
      - ""
    footer:
      - ""
      - "{grad:soft}Online {/grad}{grad:gold}%online%{/grad}{grad:soft} players{/grad}"
      - "{grad:soft}Friends {/grad}{grad:royal}%3smpcore_friends_list%{/grad}"
      - ""
      - "{grad:gold}/vote{/grad} {grad:soft}to support us{/grad}   {grad:royal}/store{/grad}"
      - ""
      - "{grad:royal_gold}&lThanks for playing 3SMP{/grad}"
      - ""
    player-format: "<rank_image> {grad:rank}<player>{/grad} <tab_tag>"
    nametag-prefix: "<rank_image> "
    nametag-suffix: " <tab_tag>"
    nametag-display: "<rank_image> {grad:rank}<player>{/grad}"
    gradients:
      default: "#f4cd2a:#eda323:#d28d0d"
      soft: "#ffffff:#fff7ad"
      blue_soft: "#f4cd2a:#eda323:#d28d0d"
      royal: "#f4cd2a:#eda323:#d28d0d"
      gold: "#f4cd2a:#eda323:#d28d0d"
      royal_gold: "#f4cd2a:#eda323:#d28d0d"
      owner: "#f4cd2a:#eda323:#d28d0d"
      admin: "#f4cd2a:#eda323:#d28d0d"
      dev: "#f4cd2a:#eda323:#d28d0d"
      ultra: "#f4cd2a:#eda323:#d28d0d"
      mvp: "#f4cd2a:#eda323:#d28d0d"
      vip: "#f4cd2a:#eda323:#d28d0d"
      member: "#e2e8f0:#94a3b8"
      3smp: "#f4cd2a:#eda323:#d28d0d"
    duels:
      team-one-gradient: "#ef4444:#fca5a5"
      team-two-gradient: "#2563eb:#93c5fd"
    chat:
      message-color: "#fff7ad"
    ranks:
      default:
        image: ""
        prefix: ""
        tab-prefix: ""
        gradient: "default"
        sort-weight: 999
      owner:
        image: "<img:owner>"
        prefix: ""
        tab-prefix: ""
        gradient: "owner"
        sort-weight: 1
      dev:
        image: "<img:dev>"
        prefix: ""
        tab-prefix: ""
        gradient: "dev"
        sort-weight: 2
      admin:
        image: "<img:admin>"
        prefix: ""
        tab-prefix: ""
        gradient: "admin"
        sort-weight: 3
      ultra:
        image: "<img:ultra>"
        prefix: ""
        tab-prefix: ""
        gradient: "ultra"
        sort-weight: 10
      mvp:
        image: "<img:mvp>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 20
      vip:
        image: "<img:vip>"
        prefix: ""
        tab-prefix: ""
        gradient: "vip"
        sort-weight: 30
      member:
        image: ""
        prefix: ""
        tab-prefix: ""
        gradient: "member"
        sort-weight: 100
      sr-admin:
        image: "<img:sr_admin>"
        prefix: ""
        tab-prefix: ""
        gradient: "admin"
        sort-weight: 4
      mod:
        image: "<img:mod>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 5
      sr-mod:
        image: "<img:sr_mod>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 6
      jr-mod:
        image: "<img:jr_mod>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 7
      builder:
        image: "<img:builder>"
        prefix: ""
        tab-prefix: ""
        gradient: "gold"
        sort-weight: 8
      patron:
        image: "<img:patron>"
        prefix: ""
        tab-prefix: ""
        gradient: "ultra"
        sort-weight: 15
      elite:
        image: "<img:elite>"
        prefix: ""
        tab-prefix: ""
        gradient: "mvp"
        sort-weight: 25
      pro:
        image: "<img:pro>"
        prefix: ""
        tab-prefix: ""
        gradient: "vip"
        sort-weight: 35
    sorting:
      enabled: true
      order:
        - owner
        - dev
        - admin
        - sr-mod
        - mod
        - ultra
        - mvp
        - vip
        - member
        - default
  scoreboards:
    enabled: true
    refresh-ticks: 20
    hide-line-numbers: true
    center:
      enabled: true
      title: true
      width: 28
      image-widths:
        server_logo: 10
        owner: 4
        dev: 4
        admin: 4
        sr_admin: 4
        mod: 4
        builder: 4
        sr_mod: 4
        jr_mod: 4
        pro: 4
        mvp: 4
        elite: 4
        ultra: 4
        vip: 4
        patron: 4
        3smp: 4
        solo_text: 28
    active: default
    boards:
      default:
        title: "<img:solo_text>"
        lines:
          - "{grad:gold}&m--------------{/grad}"
          - "{grad:gold}&lPLAYER{/grad}"
          - "&#dbeafe%player_name%"
          - ""
          - "{grad:gold}&lRANK{/grad}"
          - "{grad:gold}%3smpcore_scoreboard_rank%{/grad}"
          - ""
          - "{grad:gold}&lLOCATION{/grad}"
          - "{grad:gold}%world%{/grad}"
          - ""
          - "{grad:gold}&lECONOMY{/grad}"
          - "{grad:gold}$ %smpcore_money_formatted%{/grad}"
          - "{grad:gold}* %smpcore_sapphires% Sapphires{/grad}"
          - ""
          - "{grad:gold}&lSERVER{/grad}"
          - "{grad:gold}%online% online{/grad} &#64748b| {grad:gold}%ping%{/grad}"
          - "{grad:gold}&m--------------{/grad}"
          - "{grad:gold}PLAY.3SMP.NET{/grad}"
