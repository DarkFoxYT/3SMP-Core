utility:
  backpack:
    size: 54
    title: "Backpack {index}"
    all-worlds: true
    default-limit: 1
    unlimited-max-openable: 54
    deny-world-message: "<red>Backpacks are not available in this world.</red>"

admin-only-commands:
  deny-message: "<red>Only Admin+ can use that command.</red>"
  commands:
    - "give"
    - "minecraft:give"
  bypass-permissions:
    - "3smpcore.command.bypass"
    - "3smpcore.staff.admin"
    - "3smpcore.staff.sradmin"
    - "3smpcore.admin"
