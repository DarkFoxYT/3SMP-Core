alt-detection:
  enabled: true
  show-ip-to-staff: true
  max-accounts-per-ip: 5
  limit-message: "<red>You can only have <white>{max}</white> accounts online from the same connection.</red>"
  permissions:
    - "altdetector.notify"
    - "3smpcore.staff.altalerts"
    - "3smpcore.staff.sradmin"
    - "3smpcore.staff.admin"
    - "3smpcore.admin"
  message: "<gradient:#f4cd2a:#eda323:#d28d0d>[Alt Check]</gradient> <white>{player}</white> <gray>joined from the same IP as</gray> <white>{matches}</white> <dark_gray>({ip})</dark_gray>"

