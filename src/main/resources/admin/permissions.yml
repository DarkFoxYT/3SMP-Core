rank-packages:
  subscriptions:
    3rank:
      luckperms-group: "3rank"
      commands:
        - "lp user {player} parent set {group}"
        - "playerpoints give {player} 1000"
        - "eco give {player} 250000"
        - "giveclaim {player} 5000"
        - "crate key give {player} cosmic 2"
        - "lp user {player} permission set essentials.sethome.multiple.10 true"
        - "lp user {player} permission set auctionhouse.maxsell.3 true"
        - "vs backpack give {player} 2"
