notes:
  - "LuckPerms prefixes are always the main chat prefix source."
  - "ItemsAdder-style prefix placeholders can render through PlaceholderAPI when it is installed."
  - "Chat colors are chosen in Cosmetics -> Chat Colors and still follow rank and permission checks."
