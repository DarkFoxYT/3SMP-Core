rank-packages:
  subscriptions:
    "3":
      luckperms-group: "3"
      commands:
        - "lp user {player} parent addtemp {group} 30d accumulate"
        - "sapphire give {player} 1000"
        - "crate key give {player} prophecy 1"
        - "eco give {player} 350000"
        - "giveclaim {player} 5000"
        - "lp user {player} permission set essentials.sethome.multiple.15 true"
        - "lp user {player} permission set 3smpcore.home.limit.10 true"
        - "lp user {player} permission set auctionhouse.maxsell.3 true"
        - "lp user {player} permission set essentials.nick true"
        - "lp user {player} permission set essentials.workbench true"
        - "lp user {player} permission set essentials.enderchest true"
        - "lp user {player} permission set essentials.smoker true"
        - "lp user {player} permission set essentials.ptime true"
        - "lp user {player} permission set essentials.pweather true"
        - "lp user {player} meta set player-shops 200"
        - "lp user {player} permission set 3smpcore.backpack.limit.1 true"
  permanent:
    pro:
      luckperms-group: "pro"
      commands:
        - "lp user {player} parent set {group}"
        - "eco give {player} 500000"
        - "giveclaim {player} 7500"
        - "lp user {player} permission set essentials.sethome.multiple.20 true"
        - "lp user {player} permission set 3smpcore.home.limit.10 true"
        - "lp user {player} permission set auctionhouse.maxsell.4 true"
        - "lp user {player} permission set essentials.nick true"
        - "lp user {player} permission set essentials.workbench true"
        - "lp user {player} permission set essentials.enderchest true"
        - "lp user {player} permission set essentials.smoker true"
        - "lp user {player} permission set essentials.ptime true"
        - "lp user {player} permission set essentials.pweather true"
        - "lp user {player} meta set player-shops 250"
        - "lp user {player} permission set 3smpcore.backpack.limit.1 true"
    mvp:
      luckperms-group: "mvp"
      commands:
        - "lp user {player} parent set {group}"
        - "eco give {player} 750000"
        - "giveclaim {player} 10000"
        - "lp user {player} permission set essentials.sethome.multiple.35 true"
        - "lp user {player} permission set 3smpcore.home.limit.30 true"
        - "lp user {player} permission set auctionhouse.maxsell.6 true"
