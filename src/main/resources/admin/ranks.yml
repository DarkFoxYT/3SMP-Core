settings:
  ensure-luckperms-groups: true
  ensure-delay-ticks: 20
  sync-chat-styles: true
  sync-visual-ranks: true
  default-subscription-duration: "30d"
  permanent-parent-command: "lp user {player} parent add {group}"
  subscription-parent-command: "lp user {player} parent addtemp {group} {duration} accumulate"
  remove-parent-command: "lp user {player} parent remove {group}"
  broadcast-deliveries: true

messages:
  delivery-received: "<gradient:#f4cd2a:#eda323:#d28d0d>Store delivery received:</gradient> <white>{rank}</white>"
  delivery-broadcast: "<gradient:#f4cd2a:#eda323:#d28d0d>{player}</gradient> <gray>bought</gray> <white>{rank}</white> <gray>in-game!</gray>"
  rank-removed: "<gray>Your {rank} rank was removed.</gray>"

ranks:
  default:
    enabled: true
    luckperms-group: "default"
    display-name: "Member"
    weight: 999
    visual:
      image: ""
      image-id: ""
      gradient: "member"
      gradient-colors: "#e2e8f0:#94a3b8"
      sort-weight: 999
  member:
    enabled: true
    luckperms-group: "member"
    display-name: "Member"
    weight: 100
    visual:
