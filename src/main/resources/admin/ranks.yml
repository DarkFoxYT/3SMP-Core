    enabled: true
    luckperms-group: "default"
    display-name: "Member"
    weight: 999
    visual:
      image: ""
      image-id: ""
      gradient: "white"
      gradient-colors: "#ffffff:#ffffff"
      sort-weight: 999
    chat:
      priority: 1
      name-format: "<white><player></white>"
      name-color: "white"
      tag-format: "<white><tag></white>"
      tag-color: "white"
      message-color: "white"
