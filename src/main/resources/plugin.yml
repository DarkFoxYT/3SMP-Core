name: 3SMPCore
description: $description
version: '${version}'
main: net.dark.threecore.ThreeSMPCorePlugin
api-version: '1.21'
load: POSTWORLD
authors: [ DarkFox ]
softdepend: [ ItemsAdder, PlaceholderAPI, PlayerPoints, Multiverse-Core, WorldGuard, WorldEdit, TAB, DecentHolograms, Citizens, DeluxeMenus, MythicMobs, ModelEngine ]
commands:
  help:
    description: Custom 3SMP help command
    aliases: [ ? ]
  3smpcore:
    description: Central command hub
  duel:
    description: Duel command
  savearena:
    description: Save the current duel arena editor world
  zonepvp:
    description: ZonePvP admin commands
  dungeon:
    description: Dungeon commands
    aliases: [ dungeons, d ]
  dungeons:
    description: Dungeon commands
  d:
    description: Dungeon commands
  leave:
    description: Leave the current duel or duel queue
  spectate:
    description: Spectate a duel player
    aliases: [ spec ]
  party:
    description: Party command
    aliases: [ p ]
  friend:
    description: Friend command
    aliases: [ friends ]
  friends:
    description: Friend command
  visuals:
    description: Open the visual cosmetics menu
    aliases: [ visual, visduals ]
  devpanel:
    description: Open the duel developer panel
  perks:
    description: Open the cosmetics menu
    aliases: [ cosmetics ]
  sapphire:
    description: Sapphire commands
  sap:
    description: Sapphire commands
  sapphires:
    description: Sapphire commands
  gem:
    description: Gem commands
  gems:
    description: Gem commands
  launchpad:
    description: Launchpad commands
  warp:
    description: Warp commands
  back:
    description: Return to your previous survival location
  backpack:
    description: Open your survival backpack
  rtp:
    description: Random teleport commands
  spawn:
    description: Spawn command
  survival:
    description: Teleport to survival
  money:
    description: Money commands
  balance:
    description: Money balance
  bal:
    description: Money balance
  pay:
    description: Pay money to another player
  sell:
    description: Sell items for money
  shop:
    description: Open the server shop
  ah:
    description: Auction house
  auction:
    description: Auction house
  auctionhouse:
    description: Auction house
  spy:
    description: Toggle command spy
  afk:
    description: Enter the AFK zone
  daily:
    description: Open the daily rewards GUI
    aliases: [ rewards ]
  souls:
    description: Open the souls GUI
  fishdebug:
    description: Show fishing debug information
  fishingdebug:
    description: Show fishing debug information
  fishing:
    description: Open the fishing hub
  market:
    description: Market district commands
  speed:
    description: Change your walk or fly speed
  fly:
    description: Toggle flight
  gamemode:
    description: Change gamemode
  gm:
    description: Change gamemode
  gms:
    description: Set survival mode
  gmc:
    description: Set creative mode
  gma:
    description: Set adventure mode
  gmsp:
    description: Set spectator mode
  time:
    description: Set world time
  gamerule:
    description: Change a gamerule
  rank:
    description: Give configured rank packages
