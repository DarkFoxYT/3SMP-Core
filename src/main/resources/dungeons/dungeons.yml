world: dungeons_live
editor-world: dungeons_editor
spawn:
  world: dungeons_spawn
  x: 0.5
  y: 80.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0
default-level: jungle
generation:
  columns: 8
  spacing: 96
  vertical-shift: 24
  collision-search-attempts: 48
  cancel-physics-in-runs: true
  reset-before-paste: true
  force-refresh-before-run: true
  force-load-chunks-before-paste: true
  rooms:
    easy: 30
    normal: 50
    medium: 50
    hard: 70
    nightmare: 100
  room-pool:
    entrance-required: true
    boss-required: true
    exit-after-boss: true
    avoid-duplicates-until-pool-exhausted: true
  room-engine:
    max-attempts: 150
    max-placement-candidates: 96
    room-padding-blocks: 2
    connector-gap-blocks: 1
    connector-overlap-tolerance-blocks: 2.0
    allow-touching-at-connectors: true
    require-final-boss-room: false
    prevent-floating-connectors: true
    minimum-complete-rooms: 2
    seal-open-optional-connectors: true
    required-open-connector-behavior: DEAD_END_OR_RETRY
    optional-open-connector-behavior: DEAD_END_OR_RETRY
    allow-extra-ending-rooms: true
    # 0 = no cap. Used only for filler/dead-end rooms that seal leftover connectors.
    max-extra-ending-rooms: 0
    unconnected-opening-cap-material: POLISHED_BLACKSTONE
    ending-room-types:
      - DEAD_END
      - TREASURE
      - CAP
      - END
    dead-end-room-types:
      - DEAD_END
      - TREASURE
    main-path-length:
      min: 6
      max: 12
    branch-count:
      min: 2
      max: 5
    branch-length:
      min: 1
      max: 4
    allow-vertical: false
    max-y-level-difference: 3
    boss-room-required: false
    treasure-room-chance: 0.25
    mini-boss-room-chance: 0.15
    paste:
      apply-physics: false
      update-neighbors: false
      preserve-blockstates: true
      preserve-block-entities: true
    vertical:
      enabled: false
      max-levels-up: 2
      max-levels-down: 3
      max-total-y-span: 64
      require-stair-connector-types: true
    multi-entrance:
      enabled: true
      inactive-entrance-behavior: DEAD_END_OR_CAP
      inactive-entrance-room-types:
        - TREASURE
        - SECRET
        - DEAD_END
        - CAP
      allow-inactive-entrance-loops: false
      max-inactive-entrance-branches-per-room: 2
    connector-snapping:
      horizontal-default: CONNECTOR_FACE
      vertical-default: ANCHOR
      validate-exact-opening-position: true
      debug-anchor-alignment: true
dungeon-protection:
  enabled: true
  allow-bypass-in-runs: false
  prevent-break: true
  prevent-place: true
  prevent-buckets: true
  prevent-explosions: true
  prevent-fire: true
  allowed-interactions:
    - CHEST
    - BARREL
    - LEVER
    - STONE_BUTTON
dungeon-door:
  material: POLISHED_BLACKSTONE
  itemsadder-id: ""
  open-delay-seconds: 5
  slide-distance-blocks: 4
  slide-duration-ticks: 40
  sound-open: "minecraft:block.piston.extend"
  sound-close: "minecraft:block.piston.contract"
  particles: true
boulder:
  mythicmob-id: "DungeonBoulder"
  modelengine-id: "boulder"
  animations:
    idle: "idle"
    rolling: "rolling"
traps:
  mythicmobs:
    boulder: "DungeonBoulder"
    spike: "Spike_Trap"
    bridge: "Bridge_Trap"
  editor:
    save-armor-stand-markers: true
dungeons:
  boulder-traps:
    enabled: false
    fallback-visual-block: "minecraft:deepslate"
    fallback-visual:
      block: "minecraft:deepslate"
      scale: 2.0
      brightness:
        block-light: 15
        sky-light: 15
    mythicmobs:
      enabled: true
      default-mob-id: "DungeonBoulder"
    modelengine:
      enabled: true
      default-model-id: "boulder"
      scale: 1.0
    movement:
      tick-rate: 1
      speed: 0.42
      acceleration: 0.02
      max-speed: 0.85
      rotate-to-path: true
      rolling-visual: true
    trigger:
      mode: REGION
      delay-ticks: 10
      one-time: true
    damage:
      instant-kill: true
      damage-amount: 9999.0
      kill-radius: 1.6
      vertical-radius: 1.8
      bypass-permission: "3smpcore.dungeon.boulder.bypass"
    sounds:
      start: "minecraft:block.stone.break"
      rolling-loop: "minecraft:block.deepslate.step"
      scrape: "minecraft:block.grindstone.use"
      impact: "minecraft:entity.generic.explode"
      loop-interval-ticks: 12
      volume: 1.4
      pitch: 0.65
    particles:
      warning: true
      rolling-dust: true
      impact: true
inventory:
  save-on-start: true
  restore-on-end: true
  restore-on-death: true
  clear-dungeon-items: true
  keep-dungeon-loot: true
  save-potion-effects: true
  save-gamemode: true
  emergency-restore-on-join: true
  allow-move: true
  allow-drop: false
  allow-drag: true
  allow-hotbar-swap: true
  block-external-inventories: true
items:
  dungeon_key:
    type: ITEMSADDER
    id: "threesmp:dungeon_key"
    fallback: TRIPWIRE_HOOK
item:
  enabled: false
  slot: 1
  material: COMPASS
  name: "<gradient:#4c1d95:#a78bfa>Dungeons</gradient>"
levels:
  jungle:
    level-number: 1
    display-name: "<gradient:#34d399:#22c55e>Level 1: Jungle</gradient>"
    coming-soon: false
    y: 80
    solo-room-count: 5
    party-room-count: 8
    mobs-per-room-solo: 3
    mobs-per-room-per-player: 2
  desert:
    level-number: 2
    display-name: "<gradient:#f4cd2a:#eda323:#d28d0d>Level 2: Desert</gradient>"
    coming-soon: true
    y: 80
  volcanic:
    level-number: 3
    display-name: "<gradient:#f4cd2a:#eda323:#d28d0d>Level 3: Volcanic</gradient>"
    coming-soon: true
    y: 80
  icy:
    level-number: 4
    display-name: "<gradient:#D6E8F7:#60a5fa>Level 4: Icy</gradient>"
    coming-soon: true
    y: 80
  ancient:
    level-number: 5
    display-name: "<gradient:#a78bfa:#f472b6>Level 5: Ancient</gradient>"
    coming-soon: true
    y: 80
markers:
  bounds: WHITE_SHULKER_BOX
  entrances: YELLOW_SHULKER_BOX
  connectors: ORANGE_SHULKER_BOX
  vertical-up: MAGENTA_SHULKER_BOX
  vertical-down: BROWN_SHULKER_BOX
  enemy-spawns: LIGHT_BLUE_SHULKER_BOX
  exits: RED_SHULKER_BOX
  triggers: PURPLE_SHULKER_BOX
  player-spawn: GREEN_SHULKER_BOX
  boss: BLACK_SHULKER_BOX
  boss-spawner: CRYING_OBSIDIAN
future-drops:
  custom-gems: true
  sapphire-items-very-rare: true

rewards:
  money-per-kill:
    easy: 10.0
    normal: 20.0
    hard: 30.0
    nightmare: 75.0
  boss-clear:
    sapphires: 25
    money: 10000.0
nightmare:
  required-completions: [easy, normal, hard]
  on-death:
    fail-run: true
    keep-unlock-progress: true
base-kit:
  weapon: WOODEN_SWORD
  armor: [LEATHER_BOOTS, LEATHER_LEGGINGS, LEATHER_CHESTPLATE, LEATHER_HELMET]
  items: [COOKED_BEEF:8]
world-generation:
  void-world: true
  multiverse: true
  instance-prefix: dungeon_run_
  generator: VoidGen
  disable-mob-spawning: true
  disable-weather: true
  disable-random-ticks: true
  allowed-spawn-reasons:
    - CUSTOM
    - COMMAND
boss:
  mythicmob: Dungeon_Panda
  spawn-command: "mm mobs spawn %mob% 1 %world%,%x%,%y%,%z%"
  levels:
    jungle: 5
  legacy-aliases:
    DungeonBoss: "Dungeon_Panda"
    JungleBoss: "Dungeon_Panda"
    JungleBossEasy: "Dungeon_Panda"
    JungleBossNormal: "Dungeon_Panda"
    JungleBossMedium: "Dungeon_Panda"
    JungleBossHard: "Dungeon_Panda"
    JungleBossNightmare: "Dungeon_Panda"
  mythicmobs:
    jungle:
      easy: "Dungeon_Panda"
      normal: "Dungeon_Panda"
      hard: "Dungeon_Panda"
      nightmare: "Dungeon_Panda"
    default:
      easy: "Dungeon_Panda"
      normal: "Dungeon_Panda"
      hard: "Dungeon_Panda"
      nightmare: "Dungeon_Panda"
debug:
  enabled: true

completion:
  allow-early-exit: true
  full-clear-money-multiplier: 1.0
  early-exit-money-multiplier: 0.45
  require-boss-for-full-complete: true
rooms:
  roles:
    entrance: "Room with a green/player-spawn marker. Always generated first."
    normal: "Random pooled rooms. Supports hundreds of saved templates."
    boss: "Room with a black/boss marker. Generated before the exit room."
    exit: "Room with a red/exit marker. Intended to unlock after boss defeat."
  size-categories:
    small: "Below 24x24x16-ish volume."
    medium: "Medium-sized room pool."
    large: "Large 64x64x64-style room pool."
