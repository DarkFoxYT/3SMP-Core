    chance: 0.01
    material: HEART_OF_THE_SEA
    itemsadder: "3smp:ocean_relic"
    amount: 1
    display-name: "<gradient:#22d3ee:#a855f7>Ocean Relic</gradient>"
    lore:
      - "<gray>Extremely valuable jackpot loot.</gray>"
      - "<gradient:#f4cd2a:#eda323:#d28d0d>Worth a lot. Show it off.</gradient>"
    message: "<gradient:#22d3ee:#a855f7><bold>JACKPOT!</bold></gradient> <white>You pulled an Ocean Relic!</white>"
