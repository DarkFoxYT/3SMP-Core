menu:
  title: "<gradient:#1A2A4A:#D6E8F7>Fishing Mini-Game</gradient>"
  frame:
    material: "BLUE_STAINED_GLASS_PANE"
  fish-slot: 13
  fish-slots: [ 10, 11, 12, 13, 14, 15, 16 ]

session:
  wait-seconds:
    min: 0
    max: 32
  # Used by /fishing play and NPC/menu starts so the minigame feels alive immediately.
  instant-ready-delay-seconds: 1
  catch-window-seconds: 6
  base-fish-per-cast: 1

hub:
  title: "<gradient:#38bdf8:#22c55e>3SMP Fishing Dock</gradient>"

enchantments:
  lure:
    reduce-seconds-per-level: 8
  luck:
    rarity-bonus-per-level: 0.05
  trawler:
    multi-catch-chance-per-level: 0.15
    max-fish: 10
    pdc-key: "fishing_trawler_level"

rarity-rank-bonus:
  "3": 0.5
  pro: 0.65
  mvp: 0.75
  ultra: 1.0
  default: 0.0

rarities:
  common:
    weight: 60
    icon:
      material: COD
    display-name: "<white>Common Fish</white>"
    coins-min: 25
    coins-max: 100
    fishing-points: 1
    items: [ "COD" ]
  uncommon:
    weight: 25
    icon:
      material: SALMON
    display-name: "<green>Uncommon Fish</green>"
    coins-min: 100
    coins-max: 250
    fishing-points: 3
    items: [ "SALMON" ]
