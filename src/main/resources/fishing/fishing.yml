bonus-loot:
  saddle:
    rarities: [ uncommon, rare, legendary ]
    chance: 0.08
    material: SADDLE
    amount: 1
    display-name: "<gradient:#f4cd2a:#eda323:#d28d0d>Recovered Saddle</gradient>"
    lore:
      - "<gray>Dragged up from deep water.</gray>"
    message: "<gradient:#f4cd2a:#eda323:#d28d0d>Bonus catch:</gradient> <white>Recovered Saddle</white>"
  nautilus_shell:
    rarities: [ rare, legendary ]
    chance: 0.05
    material: NAUTILUS_SHELL
    amount: 1
    display-name: "<aqua>Nautilus Shell</aqua>"
    lore:
      - "<gray>A clean rare treasure catch.</gray>"
    message: "<aqua>Treasure catch!</aqua> <white>Nautilus Shell</white>"
  sunken_key:
    rarities: [ rare, legendary ]
    chance: 0.025
    material: TRIPWIRE_HOOK
    itemsadder: "3smp:sunken_key"
    amount: 1
    display-name: "<gradient:#f4cd2a:#eda323:#d28d0d>Sunken Crate Key</gradient>"
    lore:
      - "<gray>A valuable crate key from the ocean floor.</gray>"
    message: "<gradient:#f4cd2a:#eda323:#d28d0d>Insane catch:</gradient> <white>Sunken Crate Key</white>"
  ocean_relic:
