pages:
  main:
    permission: ""
    lines:
      - "<gradient:#f4cd2a:#eda323:#d28d0d><bold>3SMP Help</bold></gradient>"
      - "<gray>Use <white>/help</white> in game to open the command menu.</gray>"
  admin:
    permission: "3smpcore.admin"
    lines:
      - "<red><bold>Admin Help</bold></red>"
      - "<#D6E8F7>/3smpcore reload</#D6E8F7> <gray>Reload configs and managers.</gray>"
      - "<#D6E8F7>/rank give player rank</#D6E8F7> <gray>Give a rank package.</gray>"
