# 3SMPCore Help Configuration
#
# /help opens an ItemsAdder textured menu. Each page uses a font image title
# and transparent click zones so the PNG remains the visible layout.

settings:
  server-name: "3SMP"
  default-page: "main"

messages:
  unknown-page: "<red>That help page does not exist.</red>"
  no-permission: "<red>You cannot view that help page.</red>"

