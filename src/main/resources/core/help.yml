# 3SMPCore Help Configuration
#
# /help opens the ItemsAdder-textured help menu. The command category screens are
# DeluxeMenus pages opened from the transparent buttons below.

settings:
  server-name: "3SMP"
  default-page: "main"

messages:
  unknown-page: "<red>That help page does not exist.</red>"
  no-permission: "<red>You cannot view that help page.</red>"

menu:
  enabled: true
  title: ":offset_-26:&f:help_gui:"
  size: 54
  header-slot: 4
  fill:
    enabled: true
    material: "PAPER"
    itemsadder: "threesmp:gui_clickzone"
    name: " "
    lore: []
  pages:
    main:
      header:
        material: "PAPER"
        itemsadder: "threesmp:gui_clickzone"
        name: " "
        lore: []
  buttons:
    dungeons:
      slots: [ 0,1,2,3,9,10,11,12 ]
      material: "PAPER"
      itemsadder: "threesmp:gui_clickzone"
      name: "<gradient:#f4cd2a:#eda323:#d28d0d><bold>Dungeons</bold></gradient>"
      lore:
        - "<gray>Dungeon info and current status.</gray>"
        - "<yellow>Click to open.</yellow>"
      action: "console-command"
      value: "dm open dungeons_commands {player}"
    voting:
      slots: [4,5,6,13,14,15]
      material: "PAPER"
      itemsadder: "threesmp:gui_clickzone"
      name: "<gradient:#f4cd2a:#eda323:#d28d0d><bold>Voting</bold></gradient>"
      lore:
        - "<gray>Vote links, totals, and party votes.</gray>"
        - "<yellow>Click to open.</yellow>"
      action: "console-command"
      value: "dm open voting_commands {player}"
    misc:
      slots: [7,8,16,17]
      material: "PAPER"
      itemsadder: "threesmp:gui_clickzone"
      name: "<gradient:#f4cd2a:#eda323:#d28d0d><bold>Misc</bold></gradient>"
