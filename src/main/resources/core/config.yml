storage:
  type: SQLITE

chat:
  allow-gradient: true
  allow-hex: true
  max-message-length: 256
  default-prefix: ""
  format: "<prefix><tag><name-color><player></name-color><message-color>: <message>"
  rank-styles:
    default:
      priority: 1
      primary-group: "default"
      permission: ""
      name-format: "<white><player></white>"
      name-color: "white"
      tag-format: "<white><tag></white>"
      tag-color: "white"
      message-color: "white"
    member:
      priority: 2
      primary-group: "member"
      permission: ""
      name-format: "<white><player></white>"
      name-color: "white"
      tag-format: "<white><tag></white>"
      tag-color: "white"
      message-color: "white"
    owner:
      priority: 300
      primary-group: "owner"
      permission: ""
      name-format: "<gradient:#f4cd2a:#eda323:#d28d0d><player></gradient>"
      name-color: "ember"
      tag-format: "<gradient:#f4cd2a:#eda323:#d28d0d><tag></gradient>"
      tag-color: "gold"
      message-color: "gold"
    admin:
