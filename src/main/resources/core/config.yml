storage:
  type: SQLITE

chat:
  allow-gradient: true
  allow-hex: true
  max-message-length: 256
  default-prefix: ""
  format: "<prefix><tag><name-color><player></name-color><message-color>: <message>"
  rank-styles:
    owner:
      priority: 300
      primary-group: "owner"
      permission: ""
      name-format: "<gradient:#f59e0b:#ef4444><player></gradient>"
      name-color: "ember"
      tag-format: "<gradient:#f59e0b:#fbbf24><tag></gradient>"
      tag-color: "gold"
      message-color: "gold"
    admin:
      priority: 250
      primary-group: "admin"
      permission: ""
      name-format: "<gradient:#ef4444:#f59e0b><player></gradient>"
      name-color: "lava"
      tag-format: "<gradient:#f59e0b:#fbbf24><tag></gradient>"
      tag-color: "gold"
      message-color: "white"
    dev:
      priority: 240
      primary-group: "dev"
      permission: ""
      name-format: "<gradient:#7c3aed:#c084fc><player></gradient>"
      name-color: "amethyst"
      tag-format: "<gradient:#7c3aed:#c084fc><tag></gradient>"
      tag-color: "violet"
      message-color: "white"
    mvp:
      priority: 200
      primary-group: "mvp"
      permission: ""
      name-format: "<gradient:#22d3ee:#f59e0b><player></gradient>"
      name-color: "aqua_gold"
      tag-format: "<gradient:#22d3ee:#f59e0b><tag></gradient>"
      tag-color: "aqua_gold"
      message-color: "aqua"
    vip:
      priority: 150
      primary-group: "vip"
      permission: ""
      name-format: "<gradient:#f59e0b:#fbbf24><player></gradient>"
      name-color: "gold"
      tag-format: "<gradient:#f59e0b:#fbbf24><tag></gradient>"
      tag-color: "gold"
      message-color: "white"

hooks:
  itemsadder: true
  placeholderapi: true
  playerpoints: true

systems:
  duels: true
  parties: true
  perks: true
  sapphires: true
  gems: true
  leaderboards: true
  displays: true

spawn:
  protection:
    entire-world: true
    bypass-permission: 3smpcore.spawn.build
    cancel-physics: false
  world: spawn
  radius: 100.0
  effects:
    speed:
      enabled: true
      level: 2
      remove-on-exit: true
  zone:
    enabled: true
    world: spawn
    min:
      x: -100
      y: -64
      z: -100
    max:
      x: 100
      y: 320
      z: 100
    pvp:
      enabled: false
    disable-damage: true
    pvp-deny-message: "<red>PvP is disabled in spawn.</red>"
  location:
    world: spawn
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  speed-level: 2
  protection:
    enabled: true
    build: true
    place: true
    break: true

launchpads:
  default:
    display-name: "<gradient:#f59e0b:#f97316>Launchpad</gradient>"
    material: GOLD_BLOCK
    world: world
    velocity:
      x: 0.0
      y: 1.4
      z: 0.0
    target:
      world: world
      x: 0.0
      y: 120.0
      z: 0.0
      yaw: 0.0
      pitch: 0.0

