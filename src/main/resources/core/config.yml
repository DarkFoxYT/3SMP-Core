hooks:
  itemsadder: true
  placeholderapi: true
  playerpoints: true

systems:
  duels: true
  parties: true
  perks: true
  sapphires: true
  gems: true
  leaderboards: true
  displays: true

spawn:
  hotbar-items:
    enabled: false
  world: spawn
  radius: 100.0
  effects:
    speed:
      enabled: true
      level: 2
      remove-on-exit: true
  zone:
    enabled: true
    world: spawn
    min:
      x: -100
      y: -64
      z: -100
    max:
      x: 100
      y: 320
      z: 100
    pvp:
      enabled: false
    disable-damage: true
    pvp-deny-message: "<red>PvP is disabled in spawn.</red>"
  location:
    world: spawn
    x: 0.5
    y: 100.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0
  speed-level: 2
  protection:
    enabled: true
    entire-world: false
    allow-gameplay-world: false
    bypass-permission: 3smpcore.spawn.build
    cancel-physics: false
    disable-damage: true
    pvp: false
    block-interactions: true
    build: true
    place: true
    break: true

launchpads:
  default:
    display-name: "<gradient:#f4cd2a:#eda323:#d28d0d>Launchpad</gradient>"
    material: GOLD_BLOCK
    world: world
    velocity:
      x: 0.0
      y: 1.4
      z: 0.0
    target:
      world: world
      x: 0.0
      y: 120.0
      z: 0.0
      yaw: 0.0
      pitch: 0.0

