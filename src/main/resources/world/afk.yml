enabled: true
bypass-permission: 3smpcore.afk.bypass
kick-after-seconds: 900
check-interval-seconds: 5
payout-every-minutes: 30
payout-amount: 1000
kick-message: "<red>You were kicked for being AFK too long.</red>"

messages:
  entering: "<gradient:#1A2A4A:#D6E8F7>Entered AFK zone.</gradient>"
  afk: "<yellow>You are now AFK.</yellow>"
  reward: "<green>AFK reward received.</green>"
  leaving: "<gray>You left the AFK zone.</gray>"

zones:
  default:
    world: afk_void
    pos1:
      x: -10
      y: 60
      z: -10
    pos2:
      x: 10
      y: 90
      z: 10
