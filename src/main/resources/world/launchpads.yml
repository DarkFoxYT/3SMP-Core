physics:
  min-flight-ticks: 12.0
  max-flight-ticks: 52.0
  horizontal-blocks-per-tick: 1.15
  gravity-per-tick: 0.08
  max-horizontal-velocity: 4.2
  max-vertical-velocity: 5.0

disabled-message: "<gradient:#f4cd2a:#eda323:#d28d0d>This portal is coming soon.</gradient> <gray>It is disabled while rewards and rooms are being polished.</gray>"

placements:
