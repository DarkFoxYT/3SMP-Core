    definition: default
    enabled: true
    display-name: "<gradient:#f4cd2a:#eda323:#d28d0d>Survival Portal</gradient>"
    mode: TARGET
    world: spawn
    x: -6.5
    y: 100.0
    z: 0.5
    velocity: { x: 0.0, y: 1.1, z: 0.0 }
